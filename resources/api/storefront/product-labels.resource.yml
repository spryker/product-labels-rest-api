resource:
    name: ProductLabels
    shortName: product-labels
    description: 'Storefront product labels'

    provider: Spryker\Glue\ProductLabelsRestApi\Api\Storefront\Provider\ProductLabelsStorefrontProvider

    paginationEnabled: false

    operations:
        - type: Get
          name: getProductLabel
          description: 'Retrieve a product label by its identifier.'
          openapiContext:
              summary: 'Get product label'
              responses:
                  200:
                      description: 'Product label returned.'
                  400:
                      description: 'Product label id is missing (code 1202).'
                  404:
                      description: 'Product label is not found (code 1201).'

        # Validation route so `GET /product-labels` (no id) hits provideCollection() which throws legacy 400/1202.
        # The operation is named for the route shape (a collection endpoint), so a future real list
        # implementation can take over the body without renaming the operation.
        - type: GetCollection
          name: getProductLabelCollection
          uriTemplate: '/product-labels'
          description: 'Returns 400 when called without the product label id.'
          openapiContext:
              summary: 'Returns 400 when product label id is missing'
              responses:
                  400:
                      description: 'Product label id is missing (code 1202).'

    properties:
        idProductLabel:
            type: string
            identifier: true
            writable: false
            readable: true
            description: 'Product label identifier'
            openapiContext:
                example: '2'

        name:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Label name'
            openapiContext:
                example: 'SALE %'

        isExclusive:
            type: boolean
            writable: false
            readable: true
            required: false
            description: 'Whether the label is exclusive'
            openapiContext:
                example: false

        position:
            type: integer
            writable: false
            readable: true
            required: false
            description: 'Display position of the label'
            openapiContext:
                example: 2

        frontEndReference:
            type: string
            writable: false
            readable: true
            required: false
            description: 'Front-end reference used for styling hooks'
            openapiContext:
                example: 'sale'
